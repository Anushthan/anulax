<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>a question for you :)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;600;700&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --sky-top:#eaf6fd;
    --sky-mid:#cdeafb;
    --sky-deep:#8fd1ec;
    --ink:#2b4c5c;
    --ink-soft:#5b7d8c;
    --glass:rgba(255,255,255,0.42);
    --glass-edge:rgba(255,255,255,0.75);
    --blush:#ffd3e0;
    --blush-deep:#ff9bb8;
  }

  *{box-sizing:border-box;}

  html,body{
    margin:0;
    height:100%;
    overflow:hidden;
  }

  body{
    font-family:'Nunito', sans-serif;
    background:linear-gradient(180deg, var(--sky-top) 0%, var(--sky-mid) 55%, var(--sky-deep) 100%);
    display:flex;
    align-items:center;
    justify-content:center;
    position:relative;
    height:100vh;
    color:var(--ink);
    -webkit-font-smoothing:antialiased;
  }

  /* ---------- drifting clouds / bubbles ---------- */
  .sky{
    position:absolute;
    inset:0;
    overflow:hidden;
    pointer-events:none;
  }

  .bubble{
    position:absolute;
    bottom:-120px;
    border-radius:50%;
    background:radial-gradient(circle at 30% 30%, rgba(255,255,255,0.95), rgba(255,255,255,0.15) 70%);
    opacity:0.7;
    animation:float linear infinite;
  }

  @keyframes float{
    0%{ transform:translateY(0) translateX(0); opacity:0; }
    8%{ opacity:0.65; }
    100%{ transform:translateY(-115vh) translateX(var(--drift, 20px)); opacity:0; }
  }

  .cloud{
    position:absolute;
    background:#fff;
    border-radius:100px;
    opacity:0.8;
    filter:blur(0.5px);
  }
  .cloud::before, .cloud::after{
    content:"";
    position:absolute;
    background:#fff;
    border-radius:100px;
  }

  /* ---------- card ---------- */
  .card{
    position:relative;
    z-index:5;
    width:min(420px, 88vw);
    padding:48px 36px 40px;
    border-radius:32px;
    background:var(--glass);
    border:1px solid var(--glass-edge);
    backdrop-filter:blur(18px) saturate(140%);
    -webkit-backdrop-filter:blur(18px) saturate(140%);
    box-shadow:
      0 8px 32px rgba(80,140,170,0.25),
      inset 0 1px 1px rgba(255,255,255,0.6);
    text-align:center;
    transition:transform 0.4s ease;
  }

  .eyebrow{
    font-size:13px;
    letter-spacing:0.12em;
    text-transform:uppercase;
    color:var(--ink-soft);
    margin:0 0 10px;
    font-weight:700;
  }

  h1{
    font-family:'Quicksand', sans-serif;
    font-weight:700;
    font-size:clamp(28px, 6vw, 34px);
    line-height:1.25;
    margin:0 0 8px;
    color:var(--ink);
  }

  .sub{
    font-size:15px;
    color:var(--ink-soft);
    margin:0 0 30px;
    line-height:1.5;
  }

  .balloon-row{
    display:flex;
    justify-content:center;
    gap:10px;
    font-size:26px;
    margin-bottom:22px;
    user-select:none;
  }
  .balloon-row span{
    display:inline-block;
    animation:bob 2.6s ease-in-out infinite;
  }
  .balloon-row span:nth-child(2){ animation-delay:0.3s; }
  .balloon-row span:nth-child(3){ animation-delay:0.6s; }
  .balloon-row span:nth-child(4){ animation-delay:0.9s; }

  @keyframes bob{
    0%,100%{ transform:translateY(0) rotate(-3deg); }
    50%{ transform:translateY(-8px) rotate(3deg); }
  }

  .actions{
    position:relative;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:16px;
    min-height:64px;
  }

  button{
    font-family:'Quicksand', sans-serif;
    font-weight:700;
    font-size:16px;
    border:none;
    cursor:pointer;
    border-radius:999px;
    padding:14px 30px;
    transition:transform 0.18s ease, box-shadow 0.18s ease;
  }

  .yes-btn{
    background:linear-gradient(135deg, #7fd6ef, #5fb7e0);
    color:#fff;
    box-shadow:0 10px 22px rgba(95,183,224,0.45);
    position:relative;
    z-index:2;
  }
  .yes-btn:hover{ transform:translateY(-2px) scale(1.04); }
  .yes-btn:active{ transform:scale(0.97); }

  .no-btn{
    background:rgba(255,255,255,0.55);
    color:var(--ink-soft);
    border:1px solid rgba(255,255,255,0.8);
    position:absolute;
    left:50%;
    transform:translateX(56px);
    z-index:1;
  }

  .no-hint{
    margin-top:18px;
    font-size:13px;
    color:var(--ink-soft);
    opacity:0.85;
    min-height:18px;
    transition:opacity 0.2s ease;
  }

  /* ---------- celebration view ---------- */
  .celebrate{
    display:none;
  }
  .celebrate.show{
    display:block;
    animation:pop 0.5s ease;
  }
  @keyframes pop{
    0%{ transform:scale(0.85); opacity:0; }
    100%{ transform:scale(1); opacity:1; }
  }

  .heart-burst{
    font-size:48px;
    margin-bottom:6px;
  }

  .hide{ display:none !important; }

  .confetti-layer{
    position:fixed;
    inset:0;
    pointer-events:none;
    z-index:50;
    overflow:hidden;
  }
  .confetti{
    position:absolute;
    top:-20px;
    border-radius:3px;
    animation:fall linear forwards;
  }
  @keyframes fall{
    to{ transform:translateY(110vh) rotate(540deg); opacity:0.9; }
  }

  @media (max-width:380px){
    .no-btn{ position:static; transform:none; margin-top:14px; }
    .actions{ flex-direction:column; }
  }
</style>
</head>
<body>

<div class="sky" id="sky"></div>

<div class="card" id="card">

  <div id="ask">
    <p class="eyebrow">a small question</p>
    <div class="balloon-row">
      <span>🎈</span><span>💙</span><span>☁️</span><span>🎈</span>
    </div>
    <h1>Will you be my girlfriend?</h1>
    <p class="sub">Take your time. (Not really — the clouds are waiting.)</p>

    <div class="actions">
      <button class="yes-btn" id="yesBtn" onclick="sayYes()">Yes, obviously 💙</button>
      <button class="no-btn" id="noBtn">No</button>
    </div>

    <p class="no-hint" id="hint">&nbsp;</p>
  </div>

  <div class="celebrate" id="celebrate">
    <div class="heart-burst">💙🎉💙</div>
    <h1>Yay! She said yes!</h1>
    <p class="sub">Okay, technically <em>you</em> said yes. But the clouds are throwing a party either way.</p>
  </div>

</div>

<script>
  /* ---- background bubbles ---- */
  const sky = document.getElementById('sky');
  const bubbleCount = 16;
  for(let i=0;i<bubbleCount;i++){
    const b = document.createElement('div');
    b.className = 'bubble';
    const size = 14 + Math.random()*46;
    b.style.width = size+'px';
    b.style.height = size+'px';
    b.style.left = Math.random()*100+'vw';
    b.style.setProperty('--drift', (Math.random()*80-40)+'px');
    b.style.animationDuration = (10 + Math.random()*14)+'s';
    b.style.animationDelay = (Math.random()*12)+'s';
    sky.appendChild(b);
  }

  /* a couple of soft clouds */
  const cloudSpecs = [
    {top:'12%', left:'8%', w:120, h:34},
    {top:'22%', left:'70%', w:160, h:42},
    {top:'68%', left:'78%', w:110, h:30},
    {top:'78%', left:'4%', w:140, h:36},
  ];
  cloudSpecs.forEach(c=>{
    const el = document.createElement('div');
    el.className = 'cloud';
    el.style.top = c.top;
    el.style.left = c.left;
    el.style.width = c.w+'px';
    el.style.height = c.h+'px';
    sky.appendChild(el);
  });

  /* ---- the "No" button that won't be caught ---- */
  const noBtn = document.getElementById('noBtn');
  const yesBtn = document.getElementById('yesBtn');
  const card = document.getElementById('card');
  const hint = document.getElementById('hint');

  const hints = [
    "almost had it",
    "so close!",
    "it's quick, I promise",
    "okay that one was rude",
    "the button is shy",
    "just say yes 🥺",
    "I believe in you",
    "one more try"
  ];

  let dodges = 0;

  function dodge(){
    const cardRect = card.getBoundingClientRect();
    const btnRect = noBtn.getBoundingClientRect();
    const maxX = cardRect.width - btnRect.width - 24;
    const maxY = cardRect.height - btnRect.height - 24;
    const x = Math.max(8, Math.random()*maxX);
    const y = Math.max(8, Math.random()*maxY);

    noBtn.style.position = 'absolute';
    noBtn.style.left = x+'px';
    noBtn.style.top = y+'px';
    noBtn.style.transform = 'none';

    dodges++;
    hint.textContent = hints[Math.min(dodges-1, hints.length-1)];

    // yes button grows a little more confident each time
    const scale = Math.min(1 + dodges*0.06, 1.5);
    yesBtn.style.transform = `scale(${scale})`;
  }

  noBtn.addEventListener('mouseenter', dodge);
  noBtn.addEventListener('click', (e)=>{ e.preventDefault(); dodge(); });
  noBtn.addEventListener('touchstart', (e)=>{ e.preventDefault(); dodge(); }, {passive:false});

  /* ---- celebration ---- */
  function sayYes(){
    document.getElementById('ask').classList.add('hide');
    document.getElementById('celebrate').classList.add('show');
    launchConfetti();
  }

  function launchConfetti(){
    const layer = document.createElement('div');
    layer.className = 'confetti-layer';
    document.body.appendChild(layer);

    const colors = ['#8fd1ec','#5fb7e0','#ffd3e0','#ff9bb8','#ffffff','#cdeafb'];
    const pieces = 80;

    for(let i=0;i<pieces;i++){
      const c = document.createElement('div');
      c.className = 'confetti';
      const size = 6 + Math.random()*6;
      c.style.width = size+'px';
      c.style.height = (size*0.4)+'px';
      c.style.left = Math.random()*100+'vw';
      c.style.background = colors[Math.floor(Math.random()*colors.length)];
      c.style.animationDuration = (2.2 + Math.random()*1.8)+'s';
      c.style.animationDelay = (Math.random()*0.6)+'s';
      layer.appendChild(c);
    }

    setTimeout(()=>layer.remove(), 4200);
  }
</script>

</body>
</html>
